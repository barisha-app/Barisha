<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Barış & Helin | Dijital Davetiye</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1612 0%, #2d2318 50%, #1a1612 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Arka plan altın parçacıklar */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(212,175,55,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212,175,55,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Yıldız parçacıkları */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #d4af37;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Ana Container */
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
        }

        /* Çiçek süsleme */
        .floral-decoration {
            font-size: 2rem;
            color: #c9a227;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        /* İsimler */
        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-weight: 400;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .names span {
            color: #d4af37;
            margin: 0 15px;
        }

        /* Altın çizgi */
        .divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 20px auto;
        }

        /* Alt başlık */
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            color: #a89a7c;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* Davetiyeyi Aç Butonu */
        .open-btn {
            background: linear-gradient(145deg, #d4af37, #b8962e);
            border: none;
            padding: 22px 55px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: #1a1612;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow:
                0 15px 35px rgba(0,0,0,0.4),
                0 0 20px rgba(212,175,55,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .open-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow:
                0 20px 40px rgba(0,0,0,0.5),
                0 0 30px rgba(212,175,55,0.4);
        }

        .open-btn:hover::before {
            left: 100%;
        }

        .open-btn i {
            margin-right: 10px;
        }

        /* Zarf Overlay - Tam ekran zarf efekti */
        .envelope-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1612 0%, #2d2318 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease;
        }

        .envelope-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Zarf kutusu */
        .envelope {
            position: relative;
            width: 360px;
            height: 240px;
            perspective: 1000px;
        }

        /* Zarfın gövdesi */
        .envelope-body {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #c9a227, #a47c1f);
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Zarf kapağı (üçgen şeklinde) */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #d4af37, #b8860b);
            border-radius: 8px;
            clip-path: polygon(0 0, 50% 45%, 100% 0);
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        /* Zarf kapağı açılırken */
        .envelope-overlay.active .envelope-flap {
            transform: rotateX(-180deg);
        }

        /* İçindeki davetiye kartı */
        .invitation-card {
            position: absolute;
            width: 90%;
            height: 85%;
            background: linear-gradient(145deg, #fffef7, #fef5e6);
            border-radius: 12px;
            bottom: 10%;
            left: 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transform: translateY(20px) scale(0.9);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            transition-delay: 0s;
            z-index: 1;
            border: 2px solid #d4af37;
            text-align: center;
            padding: 20px;
        }

        /* Kart çıkma animasyonu - önce kapağın açılmasını bekle */
        .envelope-overlay.active .invitation-card {
            transform: translateY(-30px) scale(1);
            opacity: 1;
            transition-delay: 0.5s;
        }

        .card-icon {
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 15px;
            animation: heartbeat 1s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            color: #5a4a2a;
            margin-bottom: 10px;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: #8a7a5a;
            letter-spacing: 2px;
        }

        /* Parıltı efekti - tam ekran altın parlaması */
        .glow-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(212,175,55,0.9) 0%, rgba(212,175,55,0.4) 50%, transparent 100%);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .glow-effect.active {
            opacity: 1;
            visibility: visible;
        }

        /* Işık parçacıkları efekti */
        .sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1002;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .sparkles.active {
            opacity: 1;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffd700;
            animation: sparkleAnim 0.6s ease-out forwards;
        }

        @keyframes sparkleAnim {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(1.5) rotate(180deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .names { font-size: 2.5rem; }
            .names span { margin: 0 10px; }
            .subtitle { font-size: 0.75rem; letter-spacing: 4px; }
            .open-btn { padding: 18px 40px; font-size: 1rem; }
            .envelope { width: 280px; height: 190px; }
            .card-icon { font-size: 2.2rem; }
            .card-title { font-size: 1.3rem; }
            .card-subtitle { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- Yıldız parçacıkları -->
    <div class="stars" id="stars"></div>

    <!-- Ana İçerik -->
    <div class="container">
        <div class="floral-decoration">
            <i class="fas fa-ring"></i>
        </div>
        <h1 class="names">Barış<span>&</span>Helin</h1>
        <div class="divider"></div>
        <p class="subtitle">Düğün Davetiyesi</p>

        <button class="open-btn" id="openBtn">
            <i class="fas fa-envelope-open-text"></i>
            Davetiyeyi Aç
        </button>
    </div>

    <!-- Zarf Animasyon Overlay -->
    <div class="envelope-overlay" id="envelopeOverlay">
        <div class="envelope">
            <div class="envelope-body"></div>
            <div class="envelope-flap"></div>
            <div class="invitation-card">
                <div class="card-icon">
                    <i class="fas fa-heart"></i>
                </div>
                <div class="card-title">Sevgili Misafirimiz</div>
                <div class="card-subtitle">Davetiniz hazırlanıyor...</div>
            </div>
        </div>
    </div>

    <!-- Parıltı Efekti -->
    <div class="glow-effect" id="glowEffect"></div>

    <!-- Işık Parçacıkları -->
    <div class="sparkles" id="sparkles"></div>

    <script>
        // Yıldızları oluştur
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Işık parçacıkları oluştur
        function createSparkles() {
            const sparklesContainer = document.getElementById('sparkles');
            sparklesContainer.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 0.3 + 's';
                sparkle.style.width = (Math.random() * 6 + 2) + 'px';
                sparkle.style.height = sparkle.style.width;
                sparklesContainer.appendChild(sparkle);
            }
        }

        // Buton tıklama efekti
        const openBtn = document.getElementById('openBtn');
        const overlay = document.getElementById('envelopeOverlay');
        const glowEffect = document.getElementById('glowEffect');
        const sparkles = document.getElementById('sparkles');

        openBtn.addEventListener('click', function() {
            // Butonu devre dışı bırak
            openBtn.style.pointerEvents = 'none';
            openBtn.style.opacity = '0.7';

            // Zarf efektini aktif et
            overlay.classList.add('active');

            // 1.3 saniye sonra davetiye kartı çıkmış olacak, parıltıyı başlat
            setTimeout(function() {
                // Işık parçacıklarını oluştur
                createSparkles();

                // Parıltı efektini aktif et
                glowEffect.classList.add('active');
                sparkles.classList.add('active');

                // 0.6 saniye sonra parıltı yavaşça söner ve yönlendirme yapılır
                setTimeout(function() {
                    // Gerçek sitenize yönlendirme
                    // "haberakedemi.com.tr/barishelin" adresine gider
                    window.location.href = 'haberakedemi.com.tr/barishelin';
                }, 600);

            }, 1300);
        });
    </script>

</body>
</html>
