<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Barış & Helin | Premium Davetiye</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Ana Arka Plan Fotoğrafı */
        .main-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('imgs/background.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(3px) brightness(0.4) saturate(1.2);
            transform: scale(1.1);
            z-index: -2;
        }

        /* Premium Karanlık & Bulanık Overlay */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at center, rgba(20,15,10,0.3) 0%, rgba(10,8,5,0.95) 100%),
                linear-gradient(135deg, rgba(30,25,15,0.8) 0%, rgba(15,12,8,0.9) 100%);
            z-index: -1;
        }

        /* Altın Işık Parıltıları */
        .golden-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 15% 25%, rgba(212,175,55,0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(212,175,55,0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(212,175,55,0.05) 0%, transparent 60%);
            pointer-events: none;
            animation: glowPulse 4s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Premium Yıldız Parçacıkları */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .star-particle.gold {
            background: linear-gradient(135deg, #ffd700, #ffec8b, #d4af37);
            box-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700, 0 0 30px rgba(255,215,0,0.5);
        }

        .star-particle.diamond {
            background: linear-gradient(135deg, #fff, #e8e8e8, #fff);
            box-shadow: 0 0 8px #fff, 0 0 15px rgba(255,255,255,0.8);
        }

        /* Floating Altın Tozları */
        .dust-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #d4af37;
            border-radius: 50%;
            opacity: 0;
            animation: floatDust 8s ease-in-out infinite;
        }

        @keyframes floatDust {
            0%, 100% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% { opacity: 0.8; transform: scale(1); }
            90% { opacity: 0.6; }
            100% {
                transform: translateY(-100px) translateX(100px) scale(0.5);
                opacity: 0;
            }
        }

        /* Ana Container */
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            position: relative;
        }

        /* Premium Çerçeve */
        .premium-frame {
            position: relative;
            padding: 60px 80px;
            background: linear-gradient(135deg, rgba(20,15,10,0.7) 0%, rgba(30,25,15,0.5) 100%);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow:
                0 25px 50px rgba(0,0,0,0.5),
                inset 0 0 60px rgba(212,175,55,0.05);
            animation: frameFloat 6s ease-in-out infinite;
        }

        @keyframes frameFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Premium Çerçeve Kenar Süslemeleri */
        .premium-frame::before,
        .premium-frame::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(212,175,55,0.4);
            pointer-events: none;
        }

        .premium-frame::before {
            top: 15px;
            left: 15px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 15px;
        }

        .premium-frame::after {
            bottom: 15px;
            right: 15px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 15px;
        }

        /* Çiçek Süsleme */
        .floral-decoration {
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 25px;
            animation: floralGlow 2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(212,175,55,0.6);
        }

        @keyframes floralGlow {
            0%, 100% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.1);
                filter: brightness(1.3);
            }
        }

        /* İsimler */
        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5rem;
            font-weight: 400;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 4px;
            text-shadow:
                0 0 30px rgba(212,175,55,0.3),
                0 4px 8px rgba(0,0,0,0.3);
            animation: nameShimmer 3s ease-in-out infinite;
        }

        @keyframes nameShimmer {
            0%, 100% {
                text-shadow:
                    0 0 30px rgba(212,175,55,0.3),
                    0 4px 8px rgba(0,0,0,0.3);
            }
            50% {
                text-shadow:
                    0 0 50px rgba(212,175,55,0.6),
                    0 0 80px rgba(212,175,55,0.3),
                    0 4px 8px rgba(0,0,0,0.3);
            }
        }

        .names span {
            color: #d4af37;
            margin: 0 20px;
            display: inline-block;
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
            75% { transform: scale(1.15); }
        }

        /* Premium Altın Çizgi */
        .divider {
            position: relative;
            width: 180px;
            height: 3px;
            margin: 25px auto;
        }

        .divider::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            animation: dividerShine 2s ease-in-out infinite;
        }

        .divider::after {
            content: '✦';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #d4af37;
            font-size: 1rem;
            background: #1a1612;
            padding: 0 10px;
            animation: starRotate 4s linear infinite;
        }

        @keyframes dividerShine {
            0%, 100% { opacity: 0.6; filter: brightness(1); }
            50% { opacity: 1; filter: brightness(1.5); }
        }

        @keyframes starRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Alt Başlık */
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 300;
            color: #c9b896;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 60px;
            animation: subtitleFade 1s ease-out;
        }

        @keyframes subtitleFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Buton */
        .open-btn {
            position: relative;
            background: linear-gradient(145deg, #d4af37, #b8962e, #c9a227);
            border: none;
            padding: 25px 70px;
            border-radius: 60px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 400;
            color: #1a1612;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                0 15px 40px rgba(0,0,0,0.4),
                0 0 30px rgba(212,175,55,0.3),
                inset 0 2px 0 rgba(255,255,255,0.2);
        }

        .open-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent,
                rgba(255,255,255,0.4),
                rgba(255,255,255,0.6),
                rgba(255,255,255,0.4),
                transparent);
            transition: left 0.6s ease;
        }

        .open-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            animation: btnShine 3s ease-in-out infinite;
        }

        @keyframes btnShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .open-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow:
                0 25px 50px rgba(0,0,0,0.5),
                0 0 60px rgba(212,175,55,0.5),
                0 0 100px rgba(212,175,55,0.3),
                inset 0 2px 0 rgba(255,255,255,0.3);
        }

        .open-btn:hover::before {
            left: 100%;
        }

        .open-btn i {
            margin-right: 12px;
            animation: iconBounce 1s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Buton Yan Parıltılar */
        .btn-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .btn-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 10px #ffd700;
        }

        /* Zarf Overlay */
        .envelope-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0806 0%, #1a1510 50%, #0a0806 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .envelope-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Premium Zarf Kutusu */
        .envelope {
            position: relative;
            width: 400px;
            height: 280px;
            perspective: 1500px;
        }

        /* Zarf Gövdesi */
        .envelope-body {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #d4af37, #b8962e, #c9a227);
            border-radius: 12px;
            box-shadow:
                0 30px 60px rgba(0,0,0,0.5),
                inset 0 -5px 20px rgba(0,0,0,0.3),
                inset 0 5px 20px rgba(255,255,255,0.1);
            animation: envelopeGlow 2s ease-in-out infinite;
        }

        @keyframes envelopeGlow {
            0%, 100% { box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 -5px 20px rgba(0,0,0,0.3), inset 0 5px 20px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 30px 60px rgba(212,175,55,0.3), inset 0 -5px 20px rgba(0,0,0,0.3), inset 0 5px 20px rgba(255,255,255,0.1); }
        }

        /* Zarf Kabartması */
        .envelope-body::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
        }

        /* Zarf Kapağı */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #e8c547, #d4af37, #c9a227);
            border-radius: 12px;
            clip-path: polygon(0 0, 50% 50%, 100% 0);
            transform-origin: top;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        .envelope-overlay.active .envelope-flap {
            transform: rotateX(-180deg);
        }

        /* İç Davetiye Kartı */
        .invitation-card {
            position: absolute;
            width: 92%;
            height: 88%;
            background: linear-gradient(145deg, #fffef7, #fef8ee, #fef5e6);
            border-radius: 15px;
            bottom: 6%;
            left: 4%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transform: translateY(30px) scale(0.85);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.3, 0.64, 1);
            transition-delay: 0s;
            z-index: 1;
            border: 3px solid #d4af37;
            text-align: center;
            padding: 25px;
        }

        .envelope-overlay.active .invitation-card {
            transform: translateY(-50px) scale(1);
            opacity: 1;
            transition-delay: 0.6s;
        }

        /* Kart Dekoratif Kenarlar */
        .invitation-card::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 10px;
            pointer-events: none;
        }

        .card-icon {
            font-size: 3.5rem;
            color: #d4af37;
            margin-bottom: 20px;
            animation: cardHeartbeat 1.2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
        }

        @keyframes cardHeartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            color: #5a4a2a;
            margin-bottom: 12px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: #8a7a5a;
            letter-spacing: 3px;
        }

        /* Premium Parıltı Efekti */
        .glow-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center,
                rgba(212,175,55,1) 0%,
                rgba(255,215,0,0.8) 20%,
                rgba(212,175,55,0.4) 50%,
                transparent 100%);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .glow-effect.active {
            opacity: 1;
            visibility: visible;
            animation: premiumGlow 0.8s ease-out forwards;
        }

        @keyframes premiumGlow {
            0% { transform: scale(0.5); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Premium Işık Parçacıkları */
        .sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1002;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .sparkles.active {
            opacity: 1;
        }

        .sparkle {
            position: absolute;
            border-radius: 50%;
            animation: sparkleAnim 1s ease-out forwards;
        }

        .sparkle.gold {
            background: radial-gradient(circle, #ffd700, #ffec8b);
            box-shadow: 0 0 15px #ffd700, 0 0 30px #ffd700, 0 0 45px rgba(255,215,0,0.5);
        }

        .sparkle.white {
            background: radial-gradient(circle, #fff, #e8e8e8);
            box-shadow: 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.8);
        }

        .sparkle.diamond {
            background: radial-gradient(circle, #fff, #c0c0c0);
            box-shadow: 0 0 8px #fff, 0 0 15px rgba(255,255,255,0.6);
        }

        @keyframes sparkleAnim {
            0% {
                transform: scale(0) rotate(0deg) translateY(0);
                opacity: 1;
            }
            50% {
                transform: scale(1.5) rotate(180deg) translateY(-50px);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(360deg) translateY(-150px);
                opacity: 0;
            }
        }

        /* Firework Parçacıkları */
        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .names { font-size: 2.8rem; letter-spacing: 2px; }
            .names span { margin: 0 12px; }
            .subtitle { font-size: 0.8rem; letter-spacing: 5px; }
            .open-btn { padding: 20px 50px; font-size: 1rem; }
            .premium-frame { padding: 40px 30px; }
            .envelope { width: 300px; height: 210px; }
            .card-icon { font-size: 2.5rem; }
            .card-title { font-size: 1.5rem; }
            .card-subtitle { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- Ana Arka Plan Fotoğrafı -->
    <div class="main-bg"></div>

    <!-- Karanlık & Bulanık Overlay -->
    <div class="dark-overlay"></div>

    <!-- Altın Işık Parıltıları -->
    <div class="golden-glow"></div>

    <!-- Premium Yıldız Parçacıkları -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- Ana İçerik -->
    <div class="container">
        <div class="premium-frame">
            <div class="floral-decoration">
                <i class="fas fa-rings-wedding"></i>
            </div>
            <h1 class="names">Barış<span>&</span>Helin</h1>
            <div class="divider"></div>
            <p class="subtitle">Premium Davetiye</p>

            <button class="open-btn" id="openBtn">
                <i class="fas fa-envelope-open-text"></i>
                Davetiyeyi Aç
            </button>
        </div>
    </div>

    <!-- Zarf Animasyon Overlay -->
    <div class="envelope-overlay" id="envelopeOverlay">
        <div class="envelope">
            <div class="envelope-body"></div>
            <div class="envelope-flap"></div>
            <div class="invitation-card">
                <div class="card-icon">
                    <i class="fas fa-heart"></i>
                </div>
                <div class="card-title">Sevgili Misafirimiz</div>
                <div class="card-subtitle">Davetiniz hazırlanıyor...</div>
            </div>
        </div>
    </div>

    <!-- Premium Parıltı Efekti -->
    <div class="glow-effect" id="glowEffect"></div>

    <!-- Premium Işık Parçacıkları -->
    <div class="sparkles" id="sparkles"></div>

    <script>
        // Premium Yıldız Parçacıkları Oluştur
        function createStars() {
            const container = document.getElementById('starsContainer');

            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle ' + (Math.random() > 0.3 ? 'gold' : 'diamond');

                const size = Math.random() * 4 + 2;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';

                star.style.animation = `starTwinkle ${Math.random() * 3 + 2}s ease-in-out infinite`;
                star.style.animationDelay = Math.random() * 3 + 's';

                container.appendChild(star);
            }

            // CSS ekle
            const style = document.createElement('style');
            style.textContent = `
                @keyframes starTwinkle {
                    0%, 100% {
                        opacity: 0.2;
                        transform: scale(1);
                    }
                    50% {
                        opacity: 1;
                        transform: scale(1.8);
                    }
                }
            `;
            document.head.appendChild(style);
        }

        // Altın Toz Parçacıkları
        function createDust() {
            const container = document.getElementById('starsContainer');

            for (let i = 0; i < 30; i++) {
                const dust = document.createElement('div');
                dust.className = 'dust-particle';
                dust.style.left = Math.random() * 100 + '%';
                dust.style.animationDelay = Math.random() * 8 + 's';
                dust.style.animationDuration = (Math.random() * 4 + 6) + 's';
                dust.style.width = (Math.random() * 3 + 1) + 'px';
                dust.style.height = dust.style.width;
                container.appendChild(dust);
            }
        }

        // Premium Parılcıklar
        function createSparkles() {
            const sparklesContainer = document.getElementById('sparkles');
            sparklesContainer.innerHTML = '';

            for (let i = 0; i < 120; i++) {
                const sparkle = document.createElement('div');
                const types = ['gold', 'white', 'diamond'];
                sparkle.className = 'sparkle ' + types[Math.floor(Math.random() * types.length)];

                const size = Math.random() * 10 + 4;
                sparkle.style.width = size + 'px';
                sparkle.style.height = size + 'px';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 0.8 + 's';
                sparkle.style.animationDuration = (Math.random() * 0.8 + 0.6) + 's';

                sparklesContainer.appendChild(sparkle);
            }
        }

        // Firework efekti
        function createFirework(x, y) {
            const sparklesContainer = document.getElementById('sparkles');
            const colors = ['#ffd700', '#ffec8b', '#fff', '#d4af37'];

            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'sparkle gold';

                const size = Math.random() * 8 + 4;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];

                const angle = (Math.PI * 2 / 20) * i;
                const velocity = Math.random() * 150 + 100;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
