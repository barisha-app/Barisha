<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bar─▒┼¤ & Helin | Premium Davetiye</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Ana Arka Plan Foto─¤raf─▒ */
        .main-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('imgs/background.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(3px) brightness(0.4) saturate(1.2);
            transform: scale(1.1);
            z-index: -2;
        }

        /* Premium Karanl─▒k & Bulan─▒k Overlay */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at center, rgba(20,15,10,0.3) 0%, rgba(10,8,5,0.95) 100%),
                linear-gradient(135deg, rgba(30,25,15,0.8) 0%, rgba(15,12,8,0.9) 100%);
            z-index: -1;
        }

        /* Alt─▒n I┼¤─▒k Par─▒lt─▒lar─▒ */
        .golden-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 15% 25%, rgba(212,175,55,0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(212,175,55,0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(212,175,55,0.05) 0%, transparent 60%);
            pointer-events: none;
            animation: glowPulse 4s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Premium Y─▒ld─▒z Par├¦ac─▒klar─▒ */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .star-particle.gold {
            background: linear-gradient(135deg, #ffd700, #ffec8b, #d4af37);
            box-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700, 0 0 30px rgba(255,215,0,0.5);
        }

        .star-particle.diamond {
            background: linear-gradient(135deg, #fff, #e8e8e8, #fff);
            box-shadow: 0 0 8px #fff, 0 0 15px rgba(255,255,255,0.8);
        }

        /* Floating Alt─▒n Tozlar─▒ */
        .dust-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #d4af37;
            border-radius: 50%;
            opacity: 0;
            animation: floatDust 8s ease-in-out infinite;
        }

        @keyframes floatDust {
            0%, 100% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% { opacity: 0.8; transform: scale(1); }
            90% { opacity: 0.6; }
            100% {
                transform: translateY(-100px) translateX(100px) scale(0.5);
                opacity: 0;
            }
        }

        /* Ana Container */
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            position: relative;
        }

        /* Premium ├ćer├¦eve */
        .premium-frame {
            position: relative;
            padding: 60px 80px;
            background: linear-gradient(135deg, rgba(20,15,10,0.7) 0%, rgba(30,25,15,0.5) 100%);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow:
                0 25px 50px rgba(0,0,0,0.5),
                inset 0 0 60px rgba(212,175,55,0.05);
            animation: frameFloat 6s ease-in-out infinite;
        }

        @keyframes frameFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Premium ├ćer├¦eve Kenar S├╝slemeleri */
        .premium-frame::before,
        .premium-frame::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(212,175,55,0.4);
            pointer-events: none;
        }

        .premium-frame::before {
            top: 15px;
            left: 15px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 15px;
        }

        .premium-frame::after {
            bottom: 15px;
            right: 15px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 15px;
        }

        /* ├ći├¦ek S├╝sleme */
        .floral-decoration {
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 25px;
            animation: floralGlow 2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(212,175,55,0.6);
        }

        @keyframes floralGlow {
            0%, 100% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.1);
                filter: brightness(1.3);
            }
        }

        /* Premium ─░simler Container */
        .names-container {
            position: relative;
            margin-bottom: 15px;
        }

        /* Gelin & Damat Ba┼¤l─▒k */
        .couple-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            animation: coupleTitleFade 1.5s ease-out;
        }

        @keyframes coupleTitleFade {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .couple-title .title-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            animation: lineExpand 1s ease-out;
        }

        @keyframes lineExpand {
            from { width: 0; }
            to { width: 60px; }
        }

        .couple-title .title-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 400;
            color: #d4af37;
            letter-spacing: 6px;
            text-transform: uppercase;
            animation: titleGlow 2s ease-in-out infinite;
            text-shadow:
                0 0 10px rgba(212,175,55,0.5),
                0 0 20px rgba(212,175,55,0.3);
        }

        @keyframes titleGlow {
            0%, 100% {
                text-shadow:
                    0 0 10px rgba(212,175,55,0.5),
                    0 0 20px rgba(212,175,55,0.3);
            }
            50% {
                text-shadow:
                    0 0 20px rgba(212,175,55,0.8),
                    0 0 40px rgba(212,175,55,0.5),
                    0 0 60px rgba(212,175,55,0.3);
            }
        }

        /* ─░simler */
        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5rem;
            font-weight: 400;
            color: #fff;
            letter-spacing: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            animation: nameFloat 4s ease-in-out infinite;
        }

        @keyframes nameFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Her harf i├¦in animasyonlu span */
        .letter {
            display: inline-block;
            opacity: 0;
            animation: letterReveal 0.8s ease-out forwards;
            position: relative;
        }

        .letter.gold {
            color: #d4af37;
        }

        @keyframes letterReveal {
            0% {
                opacity: 0;
                transform: translateY(30px) rotateX(90deg) scale(0.5);
                filter: blur(10px);
            }
            60% {
                opacity: 1;
                transform: translateY(-5px) rotateX(-10deg) scale(1.1);
                filter: blur(0);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotateX(0) scale(1);
                filter: blur(0);
            }
        }

        /* Alt─▒n & i┼¤areti */
        .names span {
            color: #d4af37;
            margin: 0 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            animation: heartBeat 1.5s ease-in-out infinite;
            text-shadow:
                0 0 20px rgba(212,175,55,0.8),
                0 0 40px rgba(212,175,55,0.4),
                0 0 60px rgba(212,175,55,0.2);
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
                text-shadow:
                    0 0 20px rgba(212,175,55,0.8),
                    0 0 40px rgba(212,175,55,0.4);
            }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% {
                transform: scale(1.2);
                text-shadow:
                    0 0 30px rgba(212,175,55,1),
                    0 0 60px rgba(212,175,55,0.6),
                    0 0 90px rgba(212,175,55,0.3);
            }
            60% { transform: scale(1); }
        }

        /* ─░sim par─▒lt─▒ efekti */
        .name-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 200%;
            background: radial-gradient(ellipse,
                rgba(212,175,55,0.15) 0%,
                transparent 70%);
            pointer-events: none;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Harf par─▒lt─▒lar─▒ */
        .letter-shine {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.4) 50%,
                transparent 100%
            );
            transform: translateX(-100%);
            animation: letterShine 3s ease-in-out infinite;
        }

        @keyframes letterShine {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        /* ─░sim hover efekti */
        .names-container:hover .letter {
            animation-play-state: paused;
        }

        .names-container:hover .letter:nth-child(odd) {
            animation: letterGlow 1.5s ease-in-out infinite;
        }

        .names-container:hover .letter:nth-child(even) {
            animation: letterGlow 1.5s ease-in-out infinite 0.5s;
        }

        @keyframes letterGlow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(212,175,55,0.3);
            }
            50% {
                text-shadow:
                    0 0 20px rgba(212,175,55,0.8),
                    0 0 40px rgba(212,175,55,0.4),
                    0 0 60px rgba(212,175,55,0.2);
            }
        }

        /* Premium shimmer efekti */
        .names::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.1),
                transparent
            );
            animation: premiumShimmer 4s ease-in-out infinite;
        }

        @keyframes premiumShimmer {
            0%, 100% { left: -100%; opacity: 0; }
            50% { left: 150%; opacity: 1; }
        }

        /* Premium Alt─▒n ├ćizgi */
        .divider {
            position: relative;
            width: 180px;
            height: 3px;
            margin: 25px auto;
        }

        .divider::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            animation: dividerShine 2s ease-in-out infinite;
        }

        .divider::after {
            content: 'Ō£”';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #d4af37;
            font-size: 1rem;
            background: #1a1612;
            padding: 0 10px;
            animation: starRotate 4s linear infinite;
        }

        @keyframes dividerShine {
            0%, 100% { opacity: 0.6; filter: brightness(1); }
            50% { opacity: 1; filter: brightness(1.5); }
        }

        @keyframes starRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Alt Ba┼¤l─▒k */
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 300;
            color: #c9b896;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 60px;
            animation: subtitleFade 1s ease-out;
        }

        @keyframes subtitleFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Buton */
        .open-btn {
            position: relative;
            background: linear-gradient(145deg, #d4af37, #b8962e, #c9a227);
            border: none;
            padding: 25px 70px;
            border-radius: 60px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 400;
            color: #1a1612;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                0 15px 40px rgba(0,0,0,0.4),
                0 0 30px rgba(212,175,55,0.3),
                inset 0 2px 0 rgba(255,255,255,0.2);
        }

        .open-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent,
                rgba(255,255,255,0.4),
                rgba(255,255,255,0.6),
                rgba(255,255,255,0.4),
                transparent);
            transition: left 0.6s ease;
        }

        .open-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            animation: btnShine 3s ease-in-out infinite;
        }

        @keyframes btnShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .open-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow:
                0 25px 50px rgba(0,0,0,0.5),
                0 0 60px rgba(212,175,55,0.5),
                0 0 100px rgba(212,175,55,0.3),
                inset 0 2px 0 rgba(255,255,255,0.3);
        }

        .open-btn:hover::before {
            left: 100%;
        }

        .open-btn i {
            margin-right: 12px;
            animation: iconBounce 1s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Buton Yan Par─▒lt─▒lar */
        .btn-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .btn-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 10px #ffd700;
        }

        /* Zarf Overlay */
        .envelope-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0806 0%, #1a1510 50%, #0a0806 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .envelope-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Premium Zarf Kutusu */
        .envelope {
            position: relative;
            width: 400px;
            height: 280px;
            perspective: 1500px;
        }

        /* Zarf G├Čvdesi */
        .envelope-body {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #d4af37, #b8962e, #c9a227);
            border-radius: 12px;
            box-shadow:
                0 30px 60px rgba(0,0,0,0.5),
                inset 0 -5px 20px rgba(0,0,0,0.3),
                inset 0 5px 20px rgba(255,255,255,0.1);
            animation: envelopeGlow 2s ease-in-out infinite;
        }

        @keyframes envelopeGlow {
            0%, 100% { box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 -5px 20px rgba(0,0,0,0.3), inset 0 5px 20px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 30px 60px rgba(212,175,55,0.3), inset 0 -5px 20px rgba(0,0,0,0.3), inset 0 5px 20px rgba(255,255,255,0.1); }
        }

        /* Zarf Kabartmas─▒ */
        .envelope-body::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
        }

        /* Zarf Kapa─¤─▒ */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #e8c547, #d4af37, #c9a227);
            border-radius: 12px;
            clip-path: polygon(0 0, 50% 50%, 100% 0);
            transform-origin: top;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        .envelope-overlay.active .envelope-flap {
            transform: rotateX(-180deg);
        }

        /* ─░├¦ Davetiye Kart─▒ */
        .invitation-card {
            position: absolute;
            width: 92%;
            height: 88%;
            background: linear-gradient(145deg, #fffef7, #fef8ee, #fef5e6);
            border-radius: 15px;
            bottom: 6%;
            left: 4%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transform: translateY(30px) scale(0.85);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.3, 0.64, 1);
            transition-delay: 0s;
            z-index: 1;
            border: 3px solid #d4af37;
            text-align: center;
            padding: 25px;
        }

        .envelope-overlay.active .invitation-card {
            transform: translateY(-50px) scale(1);
            opacity: 1;
            transition-delay: 0.6s;
        }

        /* Kart Dekoratif Kenarlar */
        .invitation-card::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 10px;
            pointer-events: none;
        }

        .card-icon {
            font-size: 3.5rem;
            color: #d4af37;
            margin-bottom: 20px;
            animation: cardHeartbeat 1.2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
        }

        @keyframes cardHeartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            color: #5a4a2a;
            margin-bottom: 12px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: #8a7a5a;
            letter-spacing: 3px;
        }

        /* Premium Par─▒lt─▒ Efekti */
        .glow-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center,
                rgba(212,175,55,1) 0%,
                rgba(255,215,0,0.8) 20%,
                rgba(212,175,55,0.4) 50%,
                transparent 100%);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .glow-effect.active {
            opacity: 1;
            visibility: visible;
            animation: premiumGlow 0.8s ease-out forwards;
        }

        @keyframes premiumGlow {
            0% { transform: scale(0.5); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Premium I┼¤─▒k Par├¦ac─▒klar─▒ */
        .sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1002;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .sparkles.active {
            opacity: 1;
        }

        .sparkle {
            position: absolute;
            border-radius: 50%;
            animation: sparkleAnim 1s ease-out forwards;
        }

        .sparkle.gold {
            background: radial-gradient(circle, #ffd700, #ffec8b);
            box-shadow: 0 0 15px #ffd700, 0 0 30px #ffd700, 0 0 45px rgba(255,215,0,0.5);
        }

        .sparkle.white {
            background: radial-gradient(circle, #fff, #e8e8e8);
            box-shadow: 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.8);
        }

        .sparkle.diamond {
            background: radial-gradient(circle, #fff, #c0c0c0);
            box-shadow: 0 0 8px #fff, 0 0 15px rgba(255,255,255,0.6);
        }

        @keyframes sparkleAnim {
            0% {
                transform: scale(0) rotate(0deg) translateY(0);
                opacity: 1;
            }
            50% {
                transform: scale(1.5) rotate(180deg) translateY(-50px);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(360deg) translateY(-150px);
                opacity: 0;
            }
        }

        /* Firework Par├¦ac─▒klar─▒ */
        .firework {
            position: absolute;

    if (highlightEnabled) {
      e.preventDefault();
      e.stopPropagation();
    }
    var rect = target.getBoundingClientRect();
    var selector = getElementSelector(target);
    var text = getElementText(target);
    var attributes = getElementAttributes(target);
    console.log("Element clicked:", {
      tagName: target.tagName,
      selector: selector,
      rect: rect
    });

    // ń½ŗÕŹ│µø┤µ¢░ķĆēõĖŁķ½śõ║«
    updateSelectedHighlight(target);

    // ķÜÉĶŚÅµé¼Õü£ķ½śõ║«’╝īÕøĀõĖ║ńÄ░Õ£©µś»ķĆēõĖŁńŖČµĆü
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    var elementInfo = {
      tagName: target.tagName.toLowerCase(),
      rect: {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("µŚĀµ│ĢÕÅæķĆüµČłµü»Õł░ńłČń¬ŚÕÅŻ:", error);
    }
  }

  // ńøæÕÉ¼µØźĶć¬ńłČń¬ŚÕÅŻńÜäµČłµü»
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // ÕÉ»ńö©ķ½śõ║«ÕŖ¤ĶāĮ
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // ń”üńö©ķ½śõ║«ÕŖ¤ĶāĮ
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // õ┐Øµīüõ║ŗõ╗ČńøæÕÉ¼ÕÖ©’╝īõĮåķĆÜĶ┐ć highlightEnabled ÕÅśķćÅµÄ¦ÕłČĶĪīõĖ║
    // Ķ┐ÖµĀĘÕÅ»õ╗źõ┐ØńĢÖķĆēõĖŁńŖČµĆüńÜäµśŠńż║
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // õĖŹķÜÉĶŚÅ selectedBox ÕÆī selectedLabel’╝īõ┐ØńĢÖķĆēõĖŁńŖČµĆü
  }

  // Õ«īÕģ©ń”üńö©ķ½śõ║«ÕŖ¤ĶāĮ’╝łń¦╗ķÖżµēĆµ£ēńøæÕÉ¼ÕÖ©’╝ē
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // µĘ╗ÕŖĀõ║ŗõ╗ČńøæÕÉ¼
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // µÜ┤ķ£▓Õģ©Õ▒ĆÕćĮµĢ░õŠøÕż¢ķā©Ķ░āńö©
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // ķĆÜĶ┐ćµČłµü»ÕÅæķĆüÕ╝ĆÕģ│µÄ¦ÕłČ
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // ķĆÜń¤źńłČń¬ŚÕÅŻĶäÜµ£¼ÕĘ▓ÕŖĀĶĮĮ
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("µŚĀµ│ĢÕÅæķĆüÕ░▒ń╗¬µČłµü»Õł░ńłČń¬ŚÕÅŻ:", error);
  }

  // µĖģńÉåÕćĮµĢ░
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
